<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Notepad</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                scrollbar-width: thin;
                scrollbar-color: #374151 #111827;
            }

            /* Chrome, Edge, Safari */
            ::-webkit-scrollbar {
                width: 10px;
            }

            ::-webkit-scrollbar-track {
                background: #111827;
            }

            ::-webkit-scrollbar-thumb {
                background: #374151;
                border-radius: 999px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #4b5563;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #111827;
            }

            textarea {
                width: 100%;
                height: 100%;
                border: none;
                outline: none;
                resize: none;

                background: #111827;
                color: #f9fafb;

                padding: 24px;

                font-size: 18px;
                line-height: 1.7;
                font-family: "Segoe UI", system-ui, sans-serif;

                caret-color: #60a5fa;
            }

            textarea::placeholder {
                color: #6b7280;
            }
        </style>
    </head>

    <body>
        <textarea id="note" placeholder="Start typing..."></textarea>

        <script>
            const note = document.getElementById("note");

            // Load saved content
            note.value = localStorage.getItem("note") || "";

            // Auto-save
            note.addEventListener("input", () => {
                localStorage.setItem("note", note.value);
            });

            // Focus on load
            note.focus();
        </script>
    </body>
</html>
